{{- $placement := .Scratch.Get "selectorPlacement" | default "header" }}

<div id="{{ $placement }}-color-selector"
  class="d-grid gap-2 col-6 mx-auto {{ if eq $placement "mobile-header" }}nav-link{{ end }}">
  
  <button
    id="theme-toggle-{{ $placement }}"
    class="btn btn-link py-2 px-0 px-lg-2 d-flex align-items-center justify-content-center"
    type="button"
    aria-label='Toggle theme'>

    <span id="theme-toggle-icon-{{ $placement }}" aria-hidden="true">
      <!-- Moon -->
      <svg id="icon-moon-{{ $placement }}" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M6 .278a.768.768 0 0 1 .08.858A7.208 7.208 0 0 0 5.5 4c0 3.866 3.134 7 7 7 .996 0 1.94-.207 2.792-.58a.768.768 0 0 1 .858.08.733.733 0 0 1 .145.83A8.001 8.001 0 1 1 6 .278z"/>
      </svg>

      <!-- Sun -->
      <svg id="icon-sun-{{ $placement }}" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" style="display: none;">
        <path d="M8 4.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"/>
        <path d="M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.414a.5.5 0 1 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zM4.464 11.536a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.464a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707z"/>
      </svg>
    </span>
  </button>
</div>

<script>
(function () {
  const placement = "{{ $placement }}";
  const button = document.getElementById(`theme-toggle-${placement}`);
  const moon = document.getElementById(`icon-moon-${placement}`);
  const sun = document.getElementById(`icon-sun-${placement}`);

  if (!button || !moon || !sun) return;

  function getPreferredTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "light" || saved === "dark") return saved;

    return window.matchMedia("(prefers-color-scheme: dark)").matches
      ? "dark"
      : "light";
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-bs-theme", theme);
    localStorage.setItem("theme", theme);

    if (theme === "dark") {
      moon.style.display = "none";
      sun.style.display = "inline";
    } else {
      moon.style.display = "inline";
      sun.style.display = "none";
    }
  }

  applyTheme(getPreferredTheme());

  button.addEventListener("click", function () {
    const current = document.documentElement.getAttribute("data-bs-theme") || "light";
    applyTheme(current === "dark" ? "light" : "dark");
  });
})();
</script>
